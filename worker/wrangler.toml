name = "billboardiq-traffic-engine"
main = "src/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Cron intentionally disabled for the POC — analytics are being run
# interactively for now (see conversation). Re-enable when the Claude API
# integration goes live commercially:
#   [triggers]
#   crons = ["0 * * * *"]  (fires hourly; handler self-filters to 6 Colombo-local slots)

[[d1_databases]]
binding = "DB"
database_name = "billboardiq-db"
database_id = "80403077-0db6-48c6-9d8f-9f4a13ec3a08"

[browser]
binding = "BROWSER"

# Set with: wrangler secret put ANTHROPIC_API_KEY
