name = "billboardiq-traffic-engine"
main = "src/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Fires hourly; the handler self-filters to 6 Colombo-local sampling slots.
# Only captures + queues screenshots (pending_snapshots) — no Claude calls
# happen in this Worker for the POC, so no paid API usage is incurred by
# this cron. Analysis of pending_snapshots happens interactively instead.
[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "billboardiq-db"
database_id = "80403077-0db6-48c6-9d8f-9f4a13ec3a08"

[browser]
binding = "BROWSER"

# Set with: wrangler secret put ANTHROPIC_API_KEY
