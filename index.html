<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark light" />
<title>BillboardIQ — Outdoor Advertising Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ================= THEME TOKENS ================= */
  :root, [data-theme="dark"] {
    --bg: #0b0d0c;
    --panel: #121514;
    --panel-2: #181b1a;
    --line: #242827;
    --text: #ecebe4;
    --muted: #6b7270;
    --accent: #d4ff3a;          /* fills, markers, bars */
    --accent-ink: #0b0d0c;      /* text placed ON accent */
    --accent-text: #d4ff3a;     /* accent used AS text */
    --accent-2: #ff6b35;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --green-bg: rgba(74,222,128,.12);
    --amber-bg: rgba(251,191,36,.12);
    --red-bg: rgba(248,113,113,.12);
    --overlay: rgba(11,13,12,.92);
    --shadow: 0 8px 30px rgba(0,0,0,.5);
    --hero-sky: linear-gradient(180deg,#1a2332 0%,#2a3441 50%,#3a4a3e 100%);
    --road: #1a1a1a;
    --road-edge: #444;
    --grid-line: rgba(255,255,255,.02);
  }
  [data-theme="light"] {
    --bg: #e9eae4;
    --panel: #f5f6f1;
    --panel-2: #e0e2d9;
    --line: #cdd1c4;
    --text: #171a17;
    --muted: #67706a;
    --accent: #cfec2f;
    --accent-ink: #151810;
    --accent-text: #5f7a00;
    --accent-2: #d94a1a;
    --green: #188544;
    --amber: #a3650a;
    --red: #cc3b3b;
    --green-bg: rgba(24,133,68,.12);
    --amber-bg: rgba(163,101,10,.14);
    --red-bg: rgba(204,59,59,.12);
    --overlay: rgba(245,246,241,.92);
    --shadow: 0 8px 30px rgba(20,24,18,.18);
    --hero-sky: linear-gradient(180deg,#b8d0e0 0%,#cfdde4 55%,#b9c9b4 100%);
    --road: #3a3d3a;
    --road-edge: #8b8f88;
    --grid-line: rgba(0,0,0,.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  html.theming, html.theming *, html.theming *::before, html.theming *::after {
    transition: background-color .28s ease, color .28s ease, border-color .28s ease, box-shadow .28s ease !important;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ================= TOP BAR ================= */
  header {
    height: 56px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 24px;
    background: var(--panel);
    position: relative;
    z-index: 1200;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .logo::before {
    content: '';
    width: 10px; height: 10px;
    background: var(--accent);
    display: inline-block;
    transform: rotate(45deg);
  }
  .logo b { color: var(--accent-text); font-weight: 400; }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .breadcrumb span { color: var(--text); }

  .top-actions { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 10px;
    border: 1px solid var(--line);
    color: var(--muted);
    background: var(--panel-2);
    white-space: nowrap;
  }
  .pill.clickable { cursor: pointer; transition: color .15s, border-color .15s; }
  .pill.clickable:hover { color: var(--text); }
  .pill.live { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, transparent); }
  .pill.live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulse 1.6s infinite;
  }
  .pill.off { color: var(--muted); }
  .pill.off::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

  .btn {
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: .5px;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform .15s, filter .15s;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .btn:active { transform: translateY(0); }
  .btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--line); }
  .btn.ghost:hover { border-color: var(--muted); }
  .btn[disabled] { opacity: .4; cursor: not-allowed; transform: none; }

  /* ================= ACCOUNT MENU ================= */
  .account-wrap { position: relative; }
  .account-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px 5px 5px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s;
    white-space: nowrap;
  }
  .account-btn:hover { border-color: var(--muted); }
  .account-btn.open { border-color: var(--accent); }
  .avatar {
    width: 26px; height: 26px;
    background: var(--accent); color: var(--accent-ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px; letter-spacing: 1px;
    flex-shrink: 0;
  }
  .avatar.guest { background: var(--panel); color: var(--muted); border: 1px dashed var(--line); }
  .avatar.admin { background: var(--amber); color: var(--bg); }
  .avatar.superuser { background: var(--red); color: var(--bg); }
  .account-label {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 1px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .5px;
  }
  .account-label .name { color: var(--text); font-weight: 500; text-transform: uppercase; }
  .account-label .role {
    font-size: 8px; letter-spacing: 1.5px; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .account-label .role .mfa-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); }
  .account-label .role .mfa-dot.on { background: var(--green); }
  .account-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 240px;
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    display: none;
    z-index: 2000;
    animation: menuDrop .18s ease;
  }
  .account-menu.show { display: block; }
  @keyframes menuDrop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .menu-head {
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--line);
    background: var(--panel-2);
  }
  .menu-head .who { font-weight: 600; font-size: 13px; }
  .menu-head .email { font-size: 11px; color: var(--muted); margin-top: 2px; word-break: break-all; }
  .menu-badges { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px; letter-spacing: 1.2px; text-transform: uppercase;
    padding: 3px 6px; border-radius: 2px;
  }
  .badge.role-user { background: var(--green-bg); color: var(--green); }
  .badge.role-admin { background: var(--amber-bg); color: var(--amber); }
  .badge.role-superuser { background: var(--red-bg); color: var(--red); }
  .badge.mfa-on { background: var(--green-bg); color: var(--green); }
  .badge.mfa-off { background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); }
  .menu-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .menu-item:hover { background: var(--panel-2); border-left-color: var(--accent); }
  .menu-item .ico {
    width: 18px; text-align: center;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted); font-size: 12px;
  }
  .menu-item:hover .ico { color: var(--accent-text); }
  .menu-item.danger { color: var(--red); }
  .menu-item.danger:hover { background: var(--red-bg); border-left-color: var(--red); }
  .menu-item.danger .ico { color: var(--red); }
  .menu-sep {
    height: 1px; background: var(--line); margin: 4px 0;
  }
  .menu-can-list {
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
  }
  .menu-can-list b { color: var(--text); font-weight: 500; }
  .menu-can-list .yes { color: var(--green); }
  .menu-can-list .no { color: var(--muted); text-decoration: line-through; }

  /* Restricted (MFA setup required) banner */
  .restricted-strip {
    background: var(--amber-bg); color: var(--amber);
    border-bottom: 1px solid var(--amber);
    padding: 6px 20px;
    font-size: 11px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .restricted-strip a { color: var(--amber); font-weight: 600; text-decoration: underline; }

  /* ================= LAYOUT ================= */
  .app {
    display: grid;
    grid-template-columns: 360px 1fr 420px;
    height: calc(100vh - 56px);
    height: calc(100dvh - 56px);
  }

  /* ================= SIDEBAR ================= */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-head {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .sidebar-head h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
  }
  .sidebar-head p { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .search-row {
    display: flex;
    gap: 8px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
  }
  .search-row input {
    flex: 1;
    min-width: 0;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: .5px;
    padding: 8px 10px;
  }
  .search-row input::placeholder { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
  .search-row select {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 8px 6px;
    cursor: pointer;
    max-width: 128px;
  }
  .search-row select:hover { color: var(--text); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
  }
  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 9px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all .15s;
  }
  .chip:hover { color: var(--text); }
  .chip.active {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
  }

  .listings { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
  .listings::-webkit-scrollbar { width: 6px; }
  .listings::-webkit-scrollbar-thumb { background: var(--line); }

  .card {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s, transform .15s;
    position: relative;
    animation: rise .35s ease backwards;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover { background: var(--panel-2); }
  .card.active { background: var(--panel-2); }
  .card.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .card:focus-visible { outline-offset: -2px; }
  .card-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .card-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .card-title { font-weight: 600; font-size: 14px; margin-top: 2px; line-height: 1.3; }
  .card-meta {
    color: var(--muted);
    font-size: 11px;
    margin-top: 4px;
    display: flex;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .5px;
  }
  .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 3px 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .status.available { background: var(--green-bg); color: var(--green); }
  .status.booked { background: var(--red-bg); color: var(--red); }
  .status.pending { background: var(--amber-bg); color: var(--amber); }

  .card-price { margin-top: 8px; display: flex; align-items: baseline; gap: 6px; }
  .card-price b {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent-text);
    letter-spacing: 1px;
    font-weight: 400;
  }
  .card-price span { font-size: 11px; color: var(--muted); }

  .no-results {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .no-results .clear-link {
    display: inline-block;
    margin-top: 10px;
    color: var(--accent-text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent-text);
    padding-bottom: 1px;
  }

  /* ================= MAP ================= */
  .map-wrap { position: relative; background: var(--bg); }
  #map { width: 100%; height: 100%; background: var(--bg); }
  .map-overlay {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--overlay);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    padding: 12px 16px;
    z-index: 500;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .map-overlay .label { color: var(--muted); font-size: 9px; text-transform: uppercase; }
  .map-overlay .value { color: var(--accent-text); font-size: 14px; margin-top: 2px; }
  .map-overlay .engine { color: var(--muted); font-size: 9px; margin-top: 6px; text-transform: uppercase; letter-spacing: 1.5px; }

  .legend {
    position: absolute;
    bottom: 16px; left: 16px;
    background: var(--overlay);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    padding: 10px 14px;
    z-index: 500;
    display: flex;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .legend div { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); }

  /* Markers (shared by both map engines) */
  .gm-marker {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
  }
  .billboard-marker {
    width: 18px; height: 18px;
    color: var(--accent);
    background: currentColor;
    border: 2px solid var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 0 2px currentColor;
    cursor: pointer;
    transition: transform .2s;
    position: relative;
  }
  .billboard-marker.booked { color: var(--red); }
  .billboard-marker.pending { color: var(--amber); }
  .billboard-marker:hover { transform: scale(1.35); }
  .billboard-marker.active { transform: scale(1.35); }
  .billboard-marker.active::after {
    content: '';
    position: absolute;
    inset: -4px;
    border: 2px solid currentColor;
    border-radius: 50%;
    animation: ping 1.4s ease-out infinite;
  }
  @keyframes ping {
    0% { transform: scale(.7); opacity: .9; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  /* Leaflet fallback chrome */
  .leaflet-container { background: var(--bg) !important; font-family: 'DM Sans', sans-serif !important; }
  .leaflet-control-attribution {
    background: var(--overlay) !important;
    color: var(--muted) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--muted) !important; }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--text) !important;
    border-color: var(--line) !important;
  }

  /* ================= DETAIL PANEL ================= */
  .detail {
    background: var(--panel);
    border-left: 1px solid var(--line);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    overscroll-behavior: contain;
  }
  .detail::-webkit-scrollbar { width: 6px; }
  .detail::-webkit-scrollbar-thumb { background: var(--line); }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state .icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: var(--line);
    letter-spacing: 4px;
  }
  .empty-state p { margin-top: 12px; font-size: 13px; }

  .detail-body { animation: rise .3s ease; }

  /* Hero: drone / street tabs */
  .hero { position: relative; }
  .htabs {
    position: absolute;
    bottom: 12px; left: 12px;
    z-index: 20;
    display: flex;
    border: 1px solid var(--line);
    background: var(--overlay);
    backdrop-filter: blur(8px);
  }
  .htab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 10px;
    color: var(--muted);
    transition: all .15s;
  }
  .htab + .htab { border-left: 1px solid var(--line); }
  .htab:hover { color: var(--text); }
  .htab.active { background: var(--accent); color: var(--accent-ink); }

  .hero-pane { height: 230px; position: relative; overflow: hidden; display: none; }
  .hero-pane.show { display: block; }

  /* Drone illustration */
  .drone-shot { background: var(--hero-sky); height: 100%; position: relative; overflow: hidden; }
  .drone-shot .gridlines {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent 0, transparent 40px, var(--grid-line) 40px, var(--grid-line) 41px),
      repeating-linear-gradient(90deg, transparent 0, transparent 40px, var(--grid-line) 40px, var(--grid-line) 41px);
  }
  .drone-shot .road {
    position: absolute;
    bottom: 30px; left: -20%;
    width: 140%;
    height: 60px;
    background: var(--road);
    transform: rotate(-8deg);
    box-shadow: 0 -1px 0 var(--road-edge) inset, 0 1px 0 var(--road-edge) inset;
  }
  .road-lines {
    position: absolute;
    bottom: 56px; left: -20%;
    width: 140%;
    height: 4px;
    background: repeating-linear-gradient(90deg, var(--accent) 0, var(--accent) 30px, transparent 30px, transparent 60px);
    transform: rotate(-8deg);
    z-index: 2;
  }
  .billboard-3d {
    position: absolute;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
  }
  .billboard-face {
    width: 140px;
    height: 70px;
    background: var(--accent);
    color: var(--accent-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    box-shadow: 4px 4px 0 rgba(0,0,0,.4);
    transform: perspective(400px) rotateY(-15deg);
    border: 2px solid var(--accent-ink);
  }
  .billboard-pole { width: 4px; height: 30px; background: #555; margin: 0 auto; }
  .drone-tag {
    position: absolute;
    top: 12px; right: 12px;

function fmtNum(n, dec) { return dec ? n.toFixed(dec) : Math.round(n).toLocaleString('en-US'); }
function countUp(el) {
  const target = parseFloat(el.dataset.count);
  const dec = parseInt(el.dataset.dec || '0', 10);
  const pre = el.dataset.pre || '';
  const suf = el.dataset.suf || '';
  if (REDUCED) { el.textContent = pre + fmtNum(target, dec) + suf; return; }
  const dur = 650, start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = pre + fmtNum(target * eased, dec) + suf;
    if (p < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function markerHTML(b) {

  { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#f7f8f3' }] },
  { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#d8dbd0' }] },
  { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },

];

/* ============ ENGINE BOOT ============ */
function loadScript(src, onload, onerror) {
  const s = document.createElement('script');
  s.src = src; s.async = true;
  s.onload = onload; s.onerror = onerror;
  document.head.appendChild(s);
}
function loadCSS(href) {
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = href;
  document.head.appendChild(l);
}
function boot() {
  if (CONFIG.GOOGLE_MAPS_API_KEY) {
    window.gm_authFailure = () => fallbackLeaflet('Google Maps key was rejected — running on the free map engine.');
    window.initGoogle = initGoogle;
    loadScript(
      'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(CONFIG.GOOGLE_MAPS_API_KEY) + '&libraries=geometry&callback=initGoogle&v=weekly',
      null,
      () => fallbackLeaflet('Google Maps failed to load — running on the free map engine.')
    );
    setTimeout(() => { if (!engine) fallbackLeaflet('Google Maps timed out — running on the free map engine.'); }, 7000);
  } else {
    fallbackLeaflet();
  }
}

function initGoogle() {
  if (engine) return;
  engine = 'google';
  gmap = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 6.9100, lng: 79.8800 },
    zoom: 12,
    styles: theme === 'dark' ? GSTYLE_DARK : GSTYLE_LIGHT,
    backgroundColor: theme === 'dark' ? '#0b0d0c' : '#e9eae4',
    disableDefaultUI: true,
    zoomControl: true,
    fullscreenControl: true,
    gestureHandling: 'greedy',
    clickableIcons: false
  });

  class HtmlMarker extends google.maps.OverlayView {
    constructor(pos, html, onClick) {
      super();
      this.pos = pos;
      this.el = document.createElement('div');
      this.el.className = 'gm-marker';
      this.el.innerHTML = html;
      this.el.addEventListener('click', e => { e.stopPropagation(); onClick(); });
    }
    onAdd() { this.getPanes().overlayMouseTarget.appendChild(this.el); }
    draw() {
      const proj = this.getProjection();
      if (!proj) return;
      const p = proj.fromLatLngToDivPixel(this.pos);
      if (p) { this.el.style.left = p.x + 'px'; this.el.style.top = p.y + 'px'; }
    }
    onRemove() { this.el.remove(); }
  }

  billboards.forEach(b => {
    const ov = new HtmlMarker(new google.maps.LatLng(b.lat, b.lng), markerHTML(b), () => selectBillboard(b.id));
    ov.setMap(gmap);
    gOverlays[b.id] = ov;
  });

  gTraffic = new google.maps.TrafficLayer();
  setTraffic(true);
  updateEngineUI();
  if (activeId) { focusMap(billboards.find(x => x.id === activeId)); setActiveMarker(activeId); }
}

function fallbackLeaflet(reason) {
  if (engine) return;
  engine = 'leaflet';
  loadCSS('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css');
  loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js', () => {
    lmap = L.map('map', { zoomControl: true, attributionControl: true }).setView([6.9100, 79.8800], 12);
    lTiles = L.tileLayer(theme === 'dark'
      ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
      { attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 19 }
    ).addTo(lmap);
    billboards.forEach(b => {
      const icon = L.divIcon({ className: '', html: markerHTML(b), iconSize: [18, 18], iconAnchor: [9, 9] });
      const m = L.marker([b.lat, b.lng], { icon }).addTo(lmap);
      m.on('click', () => selectBillboard(b.id));
      lMarkers[b.id] = m;
    });
    updateEngineUI();
    if (reason && CONFIG.GOOGLE_MAPS_API_KEY) toast(reason);
    if (activeId) { focusMap(billboards.find(x => x.id === activeId)); setActiveMarker(activeId); }
  }, () => {
    document.getElementById('engineLine').textContent = 'ENGINE: OFFLINE';
  });
}

function focusMap(b) {
  if (!b) return;
  if (engine === 'google' && gmap) {
    gmap.panTo({ lat: b.lat, lng: b.lng });
    if (gmap.getZoom() < 14) gmap.setZoom(14);
  } else if (engine === 'leaflet' && lmap) {
    lmap.flyTo([b.lat, b.lng], 14, { duration: REDUCED ? 0 : 0.8 });
  }
}

function updateEngineUI() {
  const el = document.getElementById('engineLine');
  el.textContent = engine === 'google' ? 'ENGINE: GOOGLE · LIVE DATA' : 'ENGINE: OSM · ADD GOOGLE KEY FOR LIVE';
  updateTrafficPill();
}

/* ============ TRAFFIC ============ */
function setTraffic(on) {
  trafficOn = on && engine === 'google';
  if (engine === 'google' && gTraffic) gTraffic.setMap(trafficOn ? gmap : null);
  updateTrafficPill();
}
function updateTrafficPill() {
  const p = document.getElementById('trafficPill');
  if (trafficOn) { p.classList.add('live'); p.classList.remove('off'); p.textContent = 'LIVE TRAFFIC'; }
  else { p.classList.remove('live'); p.classList.add('off'); p.textContent = 'TRAFFIC · OFF'; }
}
document.getElementById('trafficPill').addEventListener('click', () => {
  if (engine !== 'google') { toast('Live traffic needs a Google Maps API key — see CONFIG at the top of this file.'); return; }
  setTraffic(!trafficOn);
});

/* ============ LISTINGS ============ */
function visibleBillboards() {
  let list = billboards.filter(b => {
    if (currentFilter === 'available' && b.status !== 'available') return false;
    if ((currentFilter === 'digital' || currentFilter === 'static') && b.type !== currentFilter) return false;
    if (currentFilter === 'highway' && b.category !== 'highway') return false;
    if (searchTerm) {
      const hay = (b.title + ' ' + b.area + ' ' + b.id).toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  });
  if (sortMode === 'price-asc') list = list.slice().sort((a, b) => a.price - b.price);
  if (sortMode === 'price-desc') list = list.slice().sort((a, b) => b.price - a.price);
  if (sortMode === 'traffic-desc') list = list.slice().sort((a, b) => b.traffic - a.traffic);
  if (sortMode === 'cpm-asc') list = list.slice().sort((a, b) => cpmOf(a) - cpmOf(b));
  return list;
}

function renderListings() {
  const el = document.getElementById('listings');
  const list = visibleBillboards();
  document.getElementById('regionLine').textContent = 'COLOMBO • ' + list.length + ' / ' + billboards.length + ' SITES';
  if (!list.length) {
    el.innerHTML = '<div class="no-results">No sites match your filters.<br/><button class="clear-link" onclick="clearFilters()">Clear filters</button></div>';
    return;
  }
  el.innerHTML = list.map((b, i) => `
    <div class="card ${activeId === b.id ? 'active' : ''}" data-id="${b.id}" tabindex="0" role="button"
         aria-label="${b.title}" style="animation-delay:${Math.min(i * 25, 250)}ms">
      <div class="card-row">
        <div>
          <div class="card-id">${b.id} · ${b.type.toUpperCase()}</div>
          <div class="card-title">${b.title}</div>
          <div class="card-meta">
            <span>${b.size}</span>
            <span>${b.traffic.toLocaleString()}/day</span>
          </div>
        </div>
        <span class="status ${b.status}">${b.status}</span>
      </div>
      <div class="card-price">
        <b>LKR ${(b.price / 1000).toFixed(0)}K</b>
        <span>/ month</span>
      </div>
    </div>
  `).join('');
  el.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => selectBillboard(c.dataset.id));
    c.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectBillboard(c.dataset.id); }
    });
  });
}
function clearFilters() {
  currentFilter = 'all'; searchTerm = ''; sortMode = 'featured';
  document.getElementById('q').value = '';
  document.getElementById('sort').value = 'featured';
  document.querySelectorAll('.chip').forEach(x => x.classList.toggle('active', x.dataset.filter === 'all'));

}

document.querySelectorAll('.chip').forEach(c => {

document.getElementById('q').addEventListener('input', e => {

});
document.getElementById('sort').addEventListener('change', e => {

});

function selectBillboard(id) {
  activeId = id;
  const b = billboards.find(x => x.id === id);
  if (!b) return;

  setActiveMarker(id);
  focusMap(b);
  renderListings();
  const activeCard = document.querySelector('.card.active');
  if (activeCard) activeCard.scrollIntoView({ block: 'nearest', behavior: REDUCED ? 'auto' : 'smooth' });

  const hourly = [];
  for (let h = 0; h < 24; h++) {
    let v;
    if (h < 5 || h > 22) v = b.traffic * 0.01;
    else if (b.peak.includes(h)) v = b.traffic * 0.10;
    else if (h >= 7 && h <= 20) v = b.traffic * 0.05;
    else v = b.traffic * 0.02;
    hourly.push(Math.round(v));

  const maxH = Math.max(...hourly);
  const barsHtml = hourly.map((v, h) => {
    const pct = (v / maxH) * 100;
    let cls = 'bar';

    else if (pct > 50) cls += ' high';
    else if (pct > 20) cls += ' med';
    return `<div class="${cls}" data-h="${pct}" style="transition-delay:${h * 14}ms" data-val="${h}:00 · ${v.toLocaleString()} vehicles"></div>`;
  }).join('');

  const reach = (b.traffic * 30 * 1.4) / 1000000;
  const cpm = cpmOf(b);

      </div>
    </div>

    <div class="detail-head">
      <div class="id-row">
        <span class="card-id">${b.id} · ${b.type.toUpperCase()}${b.illuminated ? ' · ILLUMINATED' : ''}</span>
        <span class="status ${b.status}">${b.status}</span>
      </div>
      <h1>${b.title}</h1>
      <div class="addr">${b.area}, Colombo · ${b.description}</div>
      <a class="maplink" href="${mapsUrl}" target="_blank" rel="noopener">Open in Google Maps ↗</a>
    </div>

    <div class="specs">
      <div class="spec">
        <div class="lbl">Size</div>
        <div class="val">${b.size}</div>
      </div>
      <div class="spec">
        <div class="lbl">Daily Traffic</div>
        <div class="val"><span class="cnt" data-count="${Math.round(b.traffic / 1000)}" data-suf="K"></span><small>vehicles</small></div>
      </div>
      <div class="spec">
        <div class="lbl">Monthly Reach</div>
        <div class="val"><span class="cnt" data-count="${reach.toFixed(1)}" data-dec="1" data-suf="M"></span><small>impressions</small></div>

function mountStreetView(b) {
  const pane = document.getElementById('svPane');
  if (engine !== 'google') {
    pane.innerHTML = `
      <div class="sv-locked">
        <div class="big">STREET VIEW LOCKED</div>
        <div class="hint">Paste your Google Maps API key into CONFIG at the top of this file to see the road-level view of this site.</div>
      </div>`;
    return;
  }
  if (pane.dataset.mounted === b.id) return;
  pane.dataset.mounted = b.id;
  pane.innerHTML = '<div class="sv-canvas" id="svCanvas"></div>';
  const target = new google.maps.LatLng(b.lat, b.lng);
  new google.maps.StreetViewService().getPanorama(
    { location: target, radius: 150, source: google.maps.StreetViewSource.OUTDOOR },
    (data, status) => {
      if (status === 'OK' && data && data.location) {
        const heading = google.maps.geometry.spherical.computeHeading(data.location.latLng, target);
        panorama = new google.maps.StreetViewPanorama(document.getElementById('svCanvas'), {
          pano: data.location.pano,
          pov: { heading, pitch: 8 },
          zoom: 0,
          addressControl: false,
          motionTracking: false,
          fullscreenControl: true
        });
      } else {
        pane.innerHTML = `
          <div class="sv-locked">
            <div class="big">NO STREET COVERAGE</div>
            <div class="hint">Google has no street imagery within 150m of this site yet. Drone survey recommended.</div>
          </div>`;
      }
    }
  );
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.body.classList.remove('detail-open', 'sidebar-open');
    return;
  }
  if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
  e.preventDefault();
  const list = visibleBillboards();
  if (!list.length) return;
  let idx = list.findIndex(x => x.id === activeId);
  idx = e.key === 'ArrowDown' ? Math.min(idx + 1, list.length - 1) : Math.max(idx - 1, 0);
  if (idx < 0) idx = 0;
  selectBillboard(list[idx].id);
});

// ============ AUTH / ACCOUNT MENU ============
let currentUser = null;   // { id, email, name, role, mfaEnabled, restricted } or null

function initials(name, email) {
  const src = (name || email || '').trim();
  if (!src) return '?';
  const parts = src.split(/[\s@._-]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return src.slice(0, 2).toUpperCase();
}

function roleTitle(role) {
  if (role === 'superuser') return 'Superuser';
  if (role === 'admin') return 'Admin';
  return 'Advertiser';
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function refreshAccount() {
  try {
    const res = await fetch('/api/me');
    if (res.ok) {
      const d = await res.json();
      currentUser = d.user;
    } else {
      currentUser = null;
    }
  } catch (e) {
    currentUser = null;
  }
  renderAccount();
  updateRestrictedStrip();
}

function updateRestrictedStrip() {
  const existing = document.getElementById('restrictedStrip');
  if (currentUser && currentUser.restricted) {
    if (!existing) {
      const strip = document.createElement('div');
      strip.id = 'restrictedStrip';
      strip.className = 'restricted-strip';
      strip.innerHTML = 'Your role requires two-factor authentication. <a href="login.html">Finish MFA setup →</a>';
      document.querySelector('header').insertAdjacentElement('afterend', strip);
    }
  } else if (existing) {
    existing.remove();
  }
}

async function signOutClick() {
  try { await fetch('/api/auth/logout', { method: 'POST' }); } catch (e) {}
  currentUser = null;
  document.getElementById('accountMenu').classList.remove('show');
  document.getElementById('accountBtn').classList.remove('open');
  renderAccount();
  updateRestrictedStrip();
  toast('Signed out');
}

// Dropdown open/close
document.getElementById('accountBtn').addEventListener('click', e => {
  e.stopPropagation();
  const menu = document.getElementById('accountMenu');
  const btn = document.getElementById('accountBtn');
  const open = menu.classList.toggle('show');
  btn.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
});
document.addEventListener('click', e => {
  const menu = document.getElementById('accountMenu');
  const btn = document.getElementById('accountBtn');
  if (!menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('show');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('accountMenu').classList.remove('show');
    document.getElementById('accountBtn').classList.remove('open');
  }
});

(async function init() {
  await refreshAccount();
  billboards = await loadBillboards();
  document.getElementById('countPill').textContent = billboards.length + ' LISTINGS';
  document.getElementById('fabCount').textContent = billboards.length;
  renderListings();
  boot();
  if (!isNarrow() && billboards.length) setTimeout(() => selectBillboard(billboards[0].id), 350);
})();
</script>
</body>
