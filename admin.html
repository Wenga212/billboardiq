<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<script>
  try { var t = localStorage.getItem('bbiq-theme'); if (t === 'dark') document.documentElement.setAttribute('data-theme','dark'); } catch (e) {}
</script>
<title>Admin Console — BillboardIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root, [data-theme="light"] {
    --bg:#e9eae4; --panel:#f5f6f1; --panel-2:#e0e2d9; --line:#cdd1c4;
    --text:#171a17; --muted:#67706a;
    --accent:#cfec2f; --accent-ink:#151810; --accent-text:#5f7a00;
    --green:#188544; --amber:#a3650a; --red:#cc3b3b;
    --green-bg:rgba(24,133,68,.12); --amber-bg:rgba(163,101,10,.14); --red-bg:rgba(204,59,59,.12);
    --shadow:0 8px 30px rgba(20,24,18,.18);
  }
  [data-theme="dark"] {
    --bg:#0b0d0c; --panel:#121514; --panel-2:#181b1a; --line:#242827;
    --text:#ecebe4; --muted:#6b7270;
    --accent:#d4ff3a; --accent-ink:#0b0d0c; --accent-text:#d4ff3a;
    --green:#4ade80; --amber:#fbbf24; --red:#f87171;
    --green-bg:rgba(74,222,128,.12); --amber-bg:rgba(251,191,36,.12); --red-bg:rgba(248,113,113,.12);
    --shadow:0 8px 30px rgba(0,0,0,.5);
  }
  [data-theme="light"] {
    --bg:#e9eae4;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html.theming, html.theming * { transition: background-color .28s, color .28s, border-color .28s !important; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; }
  .mono { font-family:'JetBrains Mono',monospace; }
  button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

  header {
    height:56px; border-bottom:1px solid var(--line); background:var(--panel);
    display:flex; align-items:center; gap:20px; padding:0 20px;
  }
  .logo { font-family:'Instrument Serif', Georgia, serif; font-style:italic; font-size:30px; letter-spacing:-0.3px; line-height:1; font-weight:400; display:flex; align-items:center; gap:10px; white-space:nowrap; }
  .logo::before { content:''; width:8px; height:8px; background:var(--accent); transform:rotate(45deg); flex-shrink:0; }
  .logo b { color:var(--accent-text); font-weight:400; font-style:italic; }
  .breadcrumb { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .breadcrumb span { color:var(--text); }
  .top-actions { margin-left:auto; display:flex; gap:10px; align-items:center; }
  .pill {
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px;
    text-transform:uppercase; padding:6px 10px; border:1px solid var(--line);
    color:var(--muted); background:var(--panel-2); cursor:pointer; white-space:nowrap;
  }
  .pill:hover { color:var(--text); }

  main { max-width:1080px; margin:0 auto; padding:24px 20px 60px; }
  h2 { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; font-weight:400; margin:26px 0 4px; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:12px; }

  .panel { background:var(--panel); border:1px solid var(--line); overflow-x:auto; }
  table { width:100%; border-collapse:collapse; min-width:720px; }
  th {
    font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1.5px;
    text-transform:uppercase; color:var(--muted); text-align:left;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  td { padding:12px 14px; border-bottom:1px solid var(--line); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--panel-2); }
  .u-name { font-weight:600; }
  .u-email { color:var(--muted); font-size:12px; }
  .role {
    font-family:'JetBrains Mono',monospace; font-size:9px; padding:4px 8px;
    letter-spacing:1.5px; text-transform:uppercase; border-radius:2px;
  }
  .role.user { background:var(--green-bg); color:var(--green); }
  .role.admin { background:var(--amber-bg); color:var(--amber); }
  .role.superuser { background:var(--red-bg); color:var(--red); }
  select.role-set {
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.5px;
    text-transform:uppercase; padding:6px; cursor:pointer;
  }
  .mfa { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; }
  .mfa.on { color:var(--green); }
  .mfa.off { color:var(--muted); }
  .dt { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; }
  .del { color:var(--red); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:5px 8px; border:1px solid transparent; }
  .del:hover { border-color:var(--red); }

  .audit { list-style:none; }
  .audit li { padding:10px 14px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:baseline; }
  .audit li:last-child { border-bottom:none; }
  .a-act { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--accent-text); min-width:120px; }
  .a-det { font-size:12px; flex:1; }
  .a-who { color:var(--muted); font-size:11px; }

  .gate { max-width:420px; margin:80px auto; text-align:center; padding:40px 24px; background:var(--panel); border:1px solid var(--line); }
  .gate h1 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:2px; font-weight:400; }
  .gate p { color:var(--muted); font-size:13px; margin:10px 0 20px; line-height:1.6; }
  .btn {
    background:var(--accent); color:var(--accent-ink); padding:12px 18px;
    font-weight:700; font-size:12px; letter-spacing:1px; text-transform:uppercase;
  }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(120px);
    background:var(--accent); color:var(--accent-ink); padding:12px 20px;
    font-weight:600; font-size:13px; z-index:9999; box-shadow:var(--shadow);
    transition:transform .3s ease; max-width:min(90vw,480px); text-align:center;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .hidden { display:none; }
</style>
</head>
<body>

<header>
  <div class="logo">BILLBOARD<b>IQ</b></div>
  <div class="breadcrumb">CONSOLE / <span>USERS &amp; ROLES</span></div>
  <div class="top-actions">
    <span class="pill" id="whoami" style="cursor:default"></span>
    <button class="pill" id="themeBtn">◐ LIGHT</button>
    <button class="pill" onclick="location.href='index.html'">Map</button>
    <button class="pill" id="logoutBtn">Sign Out</button>
  </div>
</header>

<div class="gate hidden" id="gate">
  <h1 id="gate-title">CHECKING ACCESS…</h1>
  <p id="gate-msg"></p>
  <button class="btn hidden" id="gate-btn" onclick="location.href='login.html'">Go to Sign In</button>
</div>

<main class="hidden" id="main">
  <h2>USERS</h2>
  <div class="sub" id="users-sub">All registered accounts. Role changes and deletion require superuser.</div>
  <div class="panel">
    <table>
      <thead>
        <tr><th>User</th><th>Role</th><th>MFA</th><th>Last Login</th><th>Created</th><th id="th-actions"></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <section id="audit-section" class="hidden">
    <h2>AUDIT LOG</h2>
    <div class="sub">Last 100 security events — logins, failures, role changes, MFA activity.</div>
    <div class="panel"><ul class="audit" id="audit"></ul></div>
  </section>
</main>

<div class="toast" id="toast" role="status"></div>

<script>
const $ = id => document.getElementById(id);
let theme = (function(){ try { return localStorage.getItem('bbiq-theme') || 'light'; } catch(e) { return 'light'; }})();
document.documentElement.setAttribute('data-theme', theme);
document.getElementById('themeBtn').textContent = theme === 'dark' ? '◑ DARK' : '◐ LIGHT';
let me = null;

$('themeBtn').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('bbiq-theme', theme); } catch(e) {}
  document.documentElement.classList.add('theming');
  document.documentElement.setAttribute('data-theme', theme);
  $('themeBtn').textContent = theme === 'dark' ? '◑ DARK' : '◐ LIGHT';
  setTimeout(() => document.documentElement.classList.remove('theming'), 320);
});

let toastTimer = null;
function toast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
async function api(path, body) {
  const res = await fetch('/api/' + path, {
    method: body === undefined ? 'GET' : 'POST',
    headers: body === undefined ? {} : { 'Content-Type': 'application/json' },
    body: body === undefined ? undefined : JSON.stringify(body)
  });
  let data = {};
  try { data = await res.json(); } catch (e) {}
  if (!res.ok) throw new Error(data.error || ('Request failed (' + res.status + ')'));
  return data;
}
function fmtTime(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function gate(title, msg, showBtn) {
  $('gate').classList.remove('hidden');
  $('main').classList.add('hidden');
  $('gate-title').textContent = title;
  $('gate-msg').textContent = msg;
  $('gate-btn').classList.toggle('hidden', !showBtn);
}

(async function boot() {
  $('gate').classList.remove('hidden');
  try {
    const d = await api('me');
    me = d.user;
    if (me.restricted) { gate('MFA REQUIRED', 'Finish MFA setup on the sign-in page before using the console.', true); return; }
    if (me.role !== 'admin' && me.role !== 'superuser') {
      gate('ACCESS DENIED', 'The console requires an admin or superuser account. You are signed in as: ' + me.email + ' (' + me.role + ').', true);
      return;
    }
    $('whoami').textContent = me.email.split('@')[0].toUpperCase() + ' · ' + me.role.toUpperCase();
    $('gate').classList.add('hidden');
    $('main').classList.remove('hidden');
    if (me.role !== 'superuser') $('users-sub').textContent = 'All registered accounts. Sign in as a superuser to change roles or delete users.';
    await loadUsers();
    if (me.role === 'superuser') { $('audit-section').classList.remove('hidden'); await loadAudit(); }
  } catch (e) {
    gate('NOT SIGNED IN', 'Sign in with an admin or superuser account to open the console.', true);
  }
})();

async function loadUsers() {
  const d = await api('admin/users');
  const superMode = me.role === 'superuser';
  $('rows').innerHTML = d.users.map(u => {
    const roleCell = superMode
      ? '<select class="role-set" data-id="' + u.id + '">' +
          ['user', 'admin', 'superuser'].map(r =>
            '<option value="' + r + '"' + (u.role === r ? ' selected' : '') + '>' + r + '</option>').join('') +
        '</select>'
      : '<span class="role ' + u.role + '">' + u.role + '</span>';
    const delCell = superMode && u.id !== me.id
      ? '<button class="del" data-del="' + u.id + '" data-email="' + u.email + '">Delete</button>' : '';
    return '<tr>' +
      '<td><div class="u-name">' + esc(u.name) + (u.id === me.id ? ' <span class="dt">(you)</span>' : '') + '</div><div class="u-email">' + esc(u.email) + '</div></td>' +
      '<td>' + roleCell + '</td>' +
      '<td><span class="mfa ' + (u.mfaEnabled ? 'on' : 'off') + '">' + (u.mfaEnabled ? '● ACTIVE' : '○ OFF') + '</span></td>' +
      '<td class="dt">' + fmtTime(u.lastLogin) + '</td>' +
      '<td class="dt">' + fmtTime(u.createdAt) + '</td>' +
      '<td>' + delCell + '</td>' +
    '</tr>';
  }).join('');

  document.querySelectorAll('.role-set').forEach(sel => sel.addEventListener('change', async () => {
    try {
      await api('admin/role', { userId: sel.dataset.id, role: sel.value });
      toast('Role updated to ' + sel.value);
      await loadUsers();
      if (me.role === 'superuser') await loadAudit();
    } catch (e) { toast(e.message); await loadUsers(); }
  }));
  document.querySelectorAll('.del').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Delete ' + b.dataset.email + '? This cannot be undone.')) return;
    try {
      await api('admin/users/delete', { userId: b.dataset.del });
      toast('User deleted');
      await loadUsers();
      if (me.role === 'superuser') await loadAudit();
    } catch (e) { toast(e.message); }
  }));
}

async function loadAudit() {
  const d = await api('admin/audit');
  $('audit').innerHTML = d.events.map(ev =>
    '<li><span class="a-act">' + esc(ev.action) + '</span>' +
    '<span class="a-det">' + esc(ev.detail || '') + '</span>' +
    '<span class="a-who">' + esc(ev.email || 'system') + ' · ' + fmtTime(ev.created_at) + '</span></li>'
  ).join('') || '<li><span class="a-det" style="color:var(--muted)">No events yet.</span></li>';
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

$('logoutBtn').addEventListener('click', async () => {
  try { await api('auth/logout', {}); } catch (e) {}
  location.href = 'login.html';
});
</script>
</body>
</html>
